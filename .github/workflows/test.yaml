name: Run tests

on:
  push:

jobs:
  run-tests:
    name: "Run tests"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install meson
      run: pip install meson

    - name: Run tests
      run: ./run.sh
